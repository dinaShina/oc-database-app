<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OC Database Preview</title>
    <style>
      :root{color:#1e2329;background:#f5f2ec;font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;line-height:1.5}*{box-sizing:border-box}body{margin:0}button,input,select,textarea{font:inherit}button{cursor:pointer}.app{width:min(1180px,calc(100% - 32px));margin:0 auto;padding:32px 0 48px}.header{display:flex;align-items:end;justify-content:space-between;gap:24px;margin-bottom:24px}h1,h2,h3,h4,p{margin:0}h1{font-size:clamp(2rem,4vw,3.5rem);line-height:1}.eyebrow{color:#8b5b40;font-size:.78rem;font-weight:700;text-transform:uppercase}.summary,.muted{color:#596273}.layout{align-items:start;display:grid;gap:20px;grid-template-columns:minmax(320px,460px) 1fr}.panel{background:#fffaf2;border:1px solid #dfd5c7;border-radius:8px;box-shadow:0 12px 34px rgba(36,28,22,.08);padding:20px}.form-panel{position:sticky;top:20px}.heading,.title-row,.actions,.identity,.page-heading,.form-actions{display:flex;gap:12px}.heading,.title-row,.page-heading{align-items:start;justify-content:space-between;margin-bottom:18px}.actions,.form-actions{align-items:center;flex-wrap:wrap;justify-content:end}.identity{align-items:center}.field-grid,.controls{display:grid;gap:12px;grid-template-columns:1fr 1fr}.birth-grid{grid-template-columns:repeat(3,1fr)}label,.field-group{display:grid;gap:6px}label span,.group-label{color:#596273;font-size:.85rem;font-weight:700}input,select,textarea{width:100%;border:1px solid #d1c5b7;border-radius:6px;background:#fff;color:#1e2329;padding:10px 12px}textarea{min-height:92px;resize:vertical}form>label,form>.field-grid,form>.field-group,details{margin-top:12px}details{border-top:1px solid #dfd5c7;padding-top:8px}summary{color:#2f6652;cursor:pointer;font-size:.9rem;font-weight:800}.mini{border-top:1px solid #eadfd2;margin-top:14px;padding-top:12px}.mini h3{font-size:.96rem;margin-bottom:8px}.segmented{display:grid;gap:8px;grid-template-columns:repeat(3,1fr)}.two{grid-template-columns:1fr 1fr}.primary,.secondary,.delete,.choice{border-radius:6px;font-weight:800;padding:10px 12px}.primary{width:100%;border:0;background:#2f6652;color:#fff;margin-top:16px}.inline-primary{width:auto;margin-top:0}.secondary,.choice.active{border:1px solid #9cb7ad;background:#eef7f3;color:#2f6652}.choice{border:1px solid #d1c5b7;background:#fff;color:#596273}.delete{border:1px solid #c65f5f;background:#fff4f4;color:#9d3030}.inline-check{align-items:center;display:flex;gap:8px;margin-top:2px}.inline-check input{width:auto}.profile-row{display:grid;gap:14px;grid-template-columns:120px 1fr;margin-bottom:14px}.profile-preview{align-items:center;background:#e8dfd2;border:1px solid #d1c5b7;border-radius:8px;color:#6d6258;display:flex;height:120px;justify-content:center;overflow:hidden;text-align:center;width:120px}.profile-preview img{height:100%;object-fit:cover;width:100%}.card-pic{flex:0 0 86px;height:86px;width:86px}.small-pic{height:72px;width:72px}.controls{margin-bottom:14px}.count{color:#596273;margin-bottom:14px}.empty{border:1px dashed #cabba8;border-radius:8px;color:#596273;padding:24px;text-align:center}.grid{display:grid;gap:14px}.card,.center,.sub-form,.relation-card{background:#fff;border:1px solid #e4dbd0;border-radius:8px;padding:16px}.facts{display:grid;gap:8px;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));margin:12px 0}.fact{background:#f7f2eb;border-radius:6px;padding:8px}.fact strong{color:#6d6258;display:block;font-size:.78rem}.text-block{margin-top:10px}.text-block p{white-space:pre-wrap}.links{display:flex;flex-wrap:wrap;gap:10px;margin-top:12px}.links a{color:#2f6652;font-weight:800}.editor{display:grid;gap:18px}.center{align-items:center;display:flex;gap:14px}.relation-card{align-items:center;display:grid;gap:12px;grid-template-columns:auto 1fr auto}.connection{color:#2f6652;font-weight:800}@media(max-width:900px){.header,.page-heading{align-items:start;flex-direction:column}.layout{grid-template-columns:1fr}.form-panel{position:static}}@media(max-width:620px){.app{width:min(100% - 20px,1180px);padding-top:20px}.field-grid,.birth-grid,.controls,.segmented,.two,.profile-row,.relation-card{grid-template-columns:1fr}.title-row{flex-direction:column}.actions,.form-actions{justify-content:start}}
    </style>
  </head>
  <body>
    <main class="app">
      <header class="header"><div><p class="eyebrow">Local preview</p><h1>OC Database</h1></div><p class="summary">Create, edit, save, search, connect, and organize original characters.</p></header>
      <div id="app"></div>
    </main>
    <script>
      const OC_KEY="oc-database-app:ocs", FAMILY_KEY="oc-database-app:family-members", REL_KEY="oc-database-app:relationships";
      const app=document.querySelector("#app");
      const fields=["name","profilePictureUrl","profilePictureData","fullName","firstName","middleName","secondName","lastName","nickname","birthDay","birthMonth","birthYear","currentAge","gender","genderDetails","genderNotes","species","ethnicities","fandom","ownWorld","hairColor","hairLength","hairTexture","hairDetails","beardColor","beardLength","beardStyle","beardDetails","faceShape","facialFeatures","expressionsRestingFace","eyeColor","eyeShape","eyeDetails","skinTone","skinDetails","height","bodyType","build","posture","scars","birthmarks","tattoos","piercings","clothingStyle","accessories","signatureItem","voice","scent","auraPresence","appearanceNotes","personality","backstory","skillsPowers","weaknesses","pinterestLink","playlistLink","referenceLink","otherLink","notes"];
      const initial=Object.fromEntries(fields.map(f=>[f,f==="ownWorld"?false:""]));
      const nameFields=[["fullName","Full name"],["firstName","First name"],["middleName","Middle name"],["secondName","Second name"],["lastName","Last name"],["nickname","Nickname"]];
      const textAreas=[["personality","Personality"],["backstory","Backstory"],["skillsPowers","Skills / Powers"],["weaknesses","Weaknesses"],["notes","General Notes"]];
      const linkFields=[["pinterestLink","Pinterest link"],["playlistLink","Playlist link"],["referenceLink","Reference link"],["otherLink","Other link"]];
      const appearanceGroups=[{title:"Hair",fields:[["hairColor","Color"],["hairLength","Length"],["hairTexture","Type / Texture"],["hairDetails","Details"]]},{title:"Beard",fields:[["beardColor","Color"],["beardLength","Length"],["beardStyle","Style"],["beardDetails","Details"]]},{title:"Face",fields:[["faceShape","Face shape"],["facialFeatures","Facial features"],["expressionsRestingFace","Expressions / resting face"]]},{title:"Eyes",fields:[["eyeColor","Color"],["eyeShape","Shape"],["eyeDetails","Details"]]},{title:"Skin",fields:[["skinTone","Skin tone"],["skinDetails","Skin details"]]},{title:"Body",fields:[["height","Height"],["bodyType","Body type"],["build","Build"],["posture","Posture"]]},{title:"Marks",fields:[["scars","Scars"],["birthmarks","Birthmarks"],["tattoos","Tattoos"],["piercings","Piercings"]]},{title:"Style",fields:[["clothingStyle","Clothing style"],["accessories","Accessories"],["signatureItem","Signature item"]]},{title:"Other",fields:[["voice","Voice"],["scent","Scent"],["auraPresence","Aura / presence"],["appearanceNotes","General appearance notes"]]}];
      const appearanceFields=appearanceGroups.flatMap(group=>group.fields.map(([n,l])=>[n,`${group.title}: ${l}`]));
      let editingId=null, view={type:"list",ocId:null}, search="", fandom="All";
      const load=(key)=>{try{return JSON.parse(localStorage.getItem(key))||[]}catch{return[]}};
      const save=(key,value)=>localStorage.setItem(key,JSON.stringify(value));
      const esc=(v)=>String(v||"").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;");
      const id=()=>crypto.randomUUID();
      const now=()=>new Date().toISOString();
      const ocs=()=>load(OC_KEY).map(oc=>({...initial,...oc,profilePictureUrl:oc.profilePictureUrl||oc.imageUrl||"",profilePictureData:oc.profilePictureData||"",genderDetails:oc.genderDetails||oc.diverseGenderDetail||oc.diverseGenderCustom||"",skillsPowers:oc.skillsPowers||oc.abilities||"",pinterestLink:oc.pinterestLink||oc.moodboardLink||""}));
      const family=()=>load(FAMILY_KEY); const rels=()=>load(REL_KEY);
      function picture(item,cls="profile-preview"){const src=item.profilePictureData||item.profilePictureUrl;return `<div class="${cls}">${src?`<img src="${esc(src)}" alt="${esc(item.name)}" />`:"No picture"}</div>`}
      function formData(form){const fd=new FormData(form);return Object.fromEntries(fields.map(f=>[f,f==="ownWorld"?Boolean(fd.get(f)):String(fd.get(f)||"").trim()]))}
      function birth(oc){const p=[];if(oc.birthDay)p.push(String(oc.birthDay).padStart(2,"0"));if(oc.birthMonth)p.push(String(oc.birthMonth).padStart(2,"0"));if(oc.birthYear)p.push(oc.birthYear);return p.length?p.join("."):"Unknown"}
      function fact(l,v){return v?`<div class="fact"><strong>${l}</strong>${esc(v)}</div>`:""} function block(l,v){return v?`<details><summary>${l}</summary><section class="text-block"><p>${esc(v)}</p></section></details>`:""}
      function render(){ if(view.type==="family") return renderFamily(); if(view.type==="relationships") return renderRelationships(); renderList(); }
      function renderList(){const all=ocs();const fandoms=["All",...new Set(all.map(o=>o.fandom).filter(Boolean))].sort();const visible=all.filter(o=>(fandom==="All"||o.fandom===fandom)&&(!search||`${o.name} ${o.fullName} ${o.firstName} ${o.middleName} ${o.secondName} ${o.lastName} ${o.nickname} ${o.fandom}`.toLowerCase().includes(search.toLowerCase())));app.innerHTML=`<section class="layout"><form class="panel form-panel" id="oc-form">${formHtml(editingId?all.find(o=>o.id===editingId):initial)}</form><section class="panel"><div class="heading"><div><p class="eyebrow">Saved</p><h2>OC List</h2></div></div><div class="controls"><label><span>Search by name or world</span><input id="search" value="${esc(search)}" placeholder="Type to search..." /></label><label><span>Fandom / World</span><select id="fandom">${fandoms.map(f=>`<option ${f===fandom?"selected":""}>${esc(f)}</option>`).join("")}</select></label></div><p class="count">${visible.length} of ${all.length} OCs visible</p><div class="grid">${visible.length?visible.map(cardHtml).join(""):`<p class="empty">No matching OCs yet.</p>`}</div></section></section>`; bindList(); }
      function formHtml(oc){return `<div class="heading"><div><p class="eyebrow">${editingId?"Editing":"New entry"}</p><h2>${editingId?"Edit OC":"Create OC"}</h2></div>${editingId?`<button class="secondary" type="button" id="cancel-edit">Cancel</button>`:""}</div><div class="profile-row">${picture(oc)}<div><label><span>Profile picture URL</span><input name="profilePictureUrl" type="url" value="${esc(oc.profilePictureUrl)}" placeholder="https://..." /></label><label><span>Upload profile picture</span><input id="pic-upload" type="file" accept="image/*" /></label><input name="profilePictureData" type="hidden" value="${esc(oc.profilePictureData)}" /></div></div><label><span>Character name *</span><input name="name" required value="${esc(oc.name)}" /></label><details><summary>Name details</summary><div class="field-grid">${nameFields.map(([n,l])=>input(n,l,oc[n])).join("")}</div></details><div class="field-grid birth-grid">${input("birthDay","Day",oc.birthDay,"number",1,31)}${input("birthMonth","Month",oc.birthMonth,"number",1,12)}${input("birthYear","Year",oc.birthYear,"number",0,9999)}</div>${input("currentAge","Current age",oc.currentAge)}<div class="field-group"><span class="group-label">Gender</span><div class="segmented">${["Female","Male","Diverse"].map(g=>`<button class="choice ${oc.gender===g?"active":""}" type="button" data-gender="${g}">${g}</button>`).join("")}</div><input name="gender" type="hidden" value="${esc(oc.gender)}" /></div>${oc.gender?`<details open><summary>Gender details</summary><label><span>Gender details</span><input name="genderDetails" value="${esc(oc.genderDetails)}" /></label><label><span>Gender notes</span><textarea name="genderNotes">${esc(oc.genderNotes)}</textarea></label></details>`:`<input name="genderDetails" type="hidden" value=""><input name="genderNotes" type="hidden" value="">`}<div class="field-grid">${input("species","Species / Being",oc.species)}${input("ethnicities","Ethnicity / Ethnicities",oc.ethnicities)}<label><span>Fandom / World</span><input name="fandom" value="${esc(oc.fandom)}" /><label class="inline-check"><input name="ownWorld" type="checkbox" ${oc.ownWorld?"checked":""} /><span>Own World</span></label></label></div><details><summary>Appearance</summary>${appearanceGroups.map(group=>`<section class="mini"><h3>${group.title}</h3><div class="field-grid">${group.fields.map(([n,l])=>input(n,l,oc[n])).join("")}</div></section>`).join("")}</details>${textAreas.map(([n,l])=>`<label><span>${l}</span><textarea name="${n}">${esc(oc[n])}</textarea></label>`).join("")}<details><summary>Links</summary><div class="field-grid">${linkFields.map(([n,l])=>input(n,l,oc[n],"url")).join("")}</div></details>${editingId?`<div class="actions" style="margin-top:12px"><button class="secondary" type="button" data-family-form="${editingId}">Open Family Tree</button><button class="secondary" type="button" data-rel-form="${editingId}">Open Relationship Map</button></div>`:""}<button class="primary" type="submit">${editingId?"Save changes":"Save OC"}</button>`}
      function input(n,l,v,type="text",min="",max=""){return `<label><span>${l}</span><input name="${n}" type="${type}" ${min!==""?`min="${min}"`:""} ${max!==""?`max="${max}"`:""} value="${esc(v)}" /></label>`}
      function cardHtml(oc){const links=linkFields.filter(([n])=>oc[n]);const appFacts=appearanceFields.filter(([n])=>oc[n]).map(([n,l])=>fact(l,oc[n])).join("");return `<article class="card"><div class="title-row"><div class="identity">${picture(oc,"profile-preview card-pic")}<div><h3>${esc(oc.name)}</h3><p>${esc(oc.fandom||(oc.ownWorld?"Own World":"No fandom/world"))}</p><p class="muted">${[oc.species,oc.ethnicities,oc.currentAge?`Current age: ${oc.currentAge}`:""].filter(Boolean).join(" | ")}</p></div></div><div class="actions"><button class="secondary" data-edit="${oc.id}">Edit</button><button class="secondary" data-family="${oc.id}">Open Family Tree</button><button class="secondary" data-rel="${oc.id}">Open Relationship Map</button><button class="delete" data-delete="${oc.id}">Delete</button></div></div><div class="facts">${fact("Birthdate",birth(oc))+fact("Current age",oc.currentAge)+fact("Gender",[oc.gender,oc.genderDetails].filter(Boolean).join(" - "))+fact("Species / Being",oc.species)+fact("Ethnicity / Ethnicities",oc.ethnicities)+fact("Nickname",oc.nickname)+fact("Own World",oc.ownWorld?"Yes":"")}</div>${block("Gender notes",oc.genderNotes)}${appFacts?`<details><summary>Appearance</summary><div class="facts">${appFacts}</div></details>`:""}${block("Personality",oc.personality)}${block("Backstory",oc.backstory)}${block("Skills / Powers",oc.skillsPowers)}${block("Weaknesses",oc.weaknesses)}${block("General Notes",oc.notes)}${links.length?`<div class="links">${links.map(([n,l])=>`<a href="${esc(oc[n])}" target="_blank">${l}</a>`).join("")}</div>`:""}</article>`}
      function bindList(){const form=document.querySelector("#oc-form");document.querySelector("#search").oninput=e=>{search=e.target.value;render()};document.querySelector("#fandom").onchange=e=>{fandom=e.target.value;render()};document.querySelectorAll("[data-gender]").forEach(b=>b.onclick=()=>{form.elements.gender.value=form.elements.gender.value===b.dataset.gender?"":b.dataset.gender;renderFormOnly(form)});document.querySelector("#pic-upload").onchange=e=>{const file=e.target.files[0];if(!file)return;const r=new FileReader();r.onload=()=>{form.elements.profilePictureData.value=String(r.result||"");form.elements.profilePictureUrl.value="";};r.readAsDataURL(file)};form.onsubmit=e=>{e.preventDefault();const data=formData(form);if(!data.name)return;const all=ocs();if(editingId)save(OC_KEY,all.map(o=>o.id===editingId?{...o,...data,updatedAt:now()}:o));else { save(OC_KEY,[{...data,id:id(),createdAt:now(),updatedAt:now()},...all]); editingId=null; render(); return; }editingId=null;render()};const cancel=document.querySelector("#cancel-edit");if(cancel)cancel.onclick=()=>{editingId=null;render()};document.querySelectorAll("[data-edit]").forEach(b=>b.onclick=()=>{editingId=b.dataset.edit;render()});document.querySelectorAll("[data-delete]").forEach(b=>b.onclick=()=>{save(OC_KEY,ocs().filter(o=>o.id!==b.dataset.delete));save(FAMILY_KEY,family().filter(m=>m.ownerOcId!==b.dataset.delete));save(REL_KEY,rels().filter(r=>r.fromOcId!==b.dataset.delete&&r.toCharacterId!==b.dataset.delete));render()});document.querySelectorAll("[data-family]").forEach(b=>b.onclick=()=>{view={type:"family",ocId:b.dataset.family};render()});document.querySelectorAll("[data-family-form]").forEach(b=>b.onclick=()=>{view={type:"family",ocId:b.dataset.familyForm};render()});document.querySelectorAll("[data-rel]").forEach(b=>b.onclick=()=>{view={type:"relationships",ocId:b.dataset.rel};render()});document.querySelectorAll("[data-rel-form]").forEach(b=>b.onclick=()=>{view={type:"relationships",ocId:b.dataset.relForm};render()})}
      function renderFormOnly(form){const data=formData(form);if(editingId)data.id=editingId;const all=ocs();const old=editingId?all.find(o=>o.id===editingId):initial;Object.assign(old,data);renderList()}
      function renderFamily(){const oc=ocs().find(o=>o.id===view.ocId);if(!oc){view={type:"list"};return render()}const members=family().filter(m=>m.ownerOcId===oc.id);app.innerHTML=`<section class="panel editor"><div class="page-heading"><button class="secondary" id="back">Back to OC list</button><div><p class="eyebrow">Family Tree</p><h2>${esc(oc.name)}</h2></div></div><div class="center">${picture(oc,"profile-preview small-pic")}<div><h3>${esc(oc.name)}</h3><p>${esc(oc.fandom||(oc.ownWorld?"Own World":"No fandom/world"))}</p></div></div><form class="sub-form" id="family-form"><h3>Add family member</h3><div class="field-grid">${input("name","Name","")}<label><span>Relation label</span><input name="relationLabel" list="family-labels" placeholder="mother, sibling, ancestor..." /><datalist id="family-labels"><option value="mother"><option value="father"><option value="sibling"><option value="child"><option value="spouse"><option value="ancestor"></datalist></label>${input("profilePictureUrl","Profile picture URL","","url")}</div><label><span>Notes</span><textarea name="notes"></textarea></label><button class="primary inline-primary">Add member</button></form><div class="grid">${members.length?members.map(m=>`<article class="relation-card">${picture(m,"profile-preview small-pic")}<div><h3>${esc(m.name)}</h3><p>${esc(m.relationLabel||"No relation label")}</p>${block("Notes",m.notes)}</div><div class="actions"><button class="secondary" data-edit-family="${m.id}">Edit</button><button class="delete" data-del-family="${m.id}">Delete</button></div></article>`).join(""):`<p class="empty">No family members yet.</p>`}</div></section>`;document.querySelector("#back").onclick=()=>{view={type:"list"};render()};document.querySelector("#family-form").onsubmit=e=>{e.preventDefault();const fd=new FormData(e.target);if(!fd.get("name"))return;save(FAMILY_KEY,[{id:id(),ownerOcId:oc.id,name:String(fd.get("name")).trim(),relationLabel:String(fd.get("relationLabel")||"").trim(),profilePictureUrl:String(fd.get("profilePictureUrl")||"").trim(),profilePictureData:"",notes:String(fd.get("notes")||"").trim(),createdAt:now(),updatedAt:now()},...family()]);renderFamily()};document.querySelectorAll("[data-edit-family]").forEach(b=>b.onclick=()=>{const all=family(),m=all.find(x=>x.id===b.dataset.editFamily);if(!m)return;const name=prompt("Name",m.name)||m.name;const relationLabel=prompt("Relation label",m.relationLabel)||m.relationLabel;const notes=prompt("Notes",m.notes)||m.notes;save(FAMILY_KEY,all.map(x=>x.id===m.id?{...x,name,relationLabel,notes,updatedAt:now()}:x));renderFamily()});document.querySelectorAll("[data-del-family]").forEach(b=>b.onclick=()=>{save(FAMILY_KEY,family().filter(m=>m.id!==b.dataset.delFamily));renderFamily()})}
      function renderRelationships(){const oc=ocs().find(o=>o.id===view.ocId);if(!oc){view={type:"list"};return render()}const all=ocs().filter(o=>o.id!==oc.id), items=rels().filter(r=>r.fromOcId===oc.id);app.innerHTML=`<section class="panel editor"><div class="page-heading"><button class="secondary" id="back">Back to OC list</button><div><p class="eyebrow">Relationship Map</p><h2>${esc(oc.name)}</h2></div></div><form class="sub-form" id="rel-form"><h3>Add relationship</h3><div class="field-grid"><label><span>Relationship target</span><select name="targetType"><option value="savedOC">Another saved OC</option><option value="manualCharacter">Manually created character</option></select></label><label><span>Saved OC id or character name</span><input name="targetValue" list="oc-targets" /><datalist id="oc-targets">${all.map(o=>`<option value="${esc(o.id)}">${esc(o.name)}</option>`).join("")}</datalist></label><label><span>Relationship label</span><input name="label" placeholder="loves, hates, friend..." /></label><label><span>Direction</span><select name="direction"><option>one-way</option><option>two-way</option><option>none</option></select></label></div><label><span>Notes</span><textarea name="notes"></textarea></label><button class="primary inline-primary">Add relationship</button></form><div class="grid">${items.length?items.map(r=>{const target=r.targetType==="manualCharacter"?r.characterName:(ocs().find(o=>o.id===r.toCharacterId)?.name||"Unknown OC");return `<article class="relation-card"><div class="connection">${esc(oc.name)} -> ${esc(target)}</div><div><h3>${esc(r.label||"Unlabeled relationship")}</h3><p>${esc(r.direction||"")}</p>${block("Notes",r.notes)}</div><div class="actions"><button class="secondary" data-edit-rel="${r.id}">Edit</button><button class="delete" data-del-rel="${r.id}">Delete</button></div></article>`}).join(""):`<p class="empty">No relationships yet.</p>`}</div></section>`;document.querySelector("#back").onclick=()=>{view={type:"list"};render()};document.querySelector("#rel-form").onsubmit=e=>{e.preventDefault();const fd=new FormData(e.target),targetType=fd.get("targetType"),targetValue=String(fd.get("targetValue")||"").trim();if(!targetValue)return;save(REL_KEY,[{id:id(),fromOcId:oc.id,targetType,toCharacterId:targetType==="savedOC"?targetValue:"",characterName:targetType==="manualCharacter"?targetValue:"",label:String(fd.get("label")||"").trim(),category:"",notes:String(fd.get("notes")||"").trim(),direction:String(fd.get("direction")||"one-way"),createdAt:now(),updatedAt:now()},...rels()]);renderRelationships()};document.querySelectorAll("[data-edit-rel]").forEach(b=>b.onclick=()=>{const all=rels(),r=all.find(x=>x.id===b.dataset.editRel);if(!r)return;const label=prompt("Relationship label",r.label)||r.label;const notes=prompt("Notes",r.notes)||r.notes;const direction=prompt("Direction",r.direction)||r.direction;save(REL_KEY,all.map(x=>x.id===r.id?{...x,label,notes,direction,updatedAt:now()}:x));renderRelationships()});document.querySelectorAll("[data-del-rel]").forEach(b=>b.onclick=()=>{save(REL_KEY,rels().filter(r=>r.id!==b.dataset.delRel));renderRelationships()})}
      render();
    </script>
  </body>
</html>
